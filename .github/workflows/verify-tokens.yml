name: Verify tokens

on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify tokens
    runs-on: ubuntu-latest

    steps:
      - name: List workflow runs
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.READ_ACTIONS_TOKEN }}
          script: |
            const { data } = await github.rest.actions.listWorkflowRunsForRepo(context.repo);
            console.table(
              data.workflow_runs.slice(0, 5).map((r) => ({
                id: r.id,
                name: r.name,
                status: r.status,
                conclusion: r.conclusion,
              })),
            );
