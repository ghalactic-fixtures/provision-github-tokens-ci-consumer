name: Verify tokens
run-name: "Verify tokens: ${{ inputs.label }}"

on:
  workflow_dispatch:
    inputs:
      label:
        description: Human-readable label for this run
        type: string

jobs:
  verify:
    name: Verify tokens
    runs-on: ubuntu-latest

    steps:
      - name: List action secrets
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.READ_SECRETS_TOKEN }}
          script: |
            const { data } = await github.rest.actions.listRepoSecrets(context.repo);
            console.table(
              data.secrets.map((s) => ({
                name: s.name,
                created: s.created_at,
                updated: s.updated_at,
              })),
            );
